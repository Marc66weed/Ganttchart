name: Gantt CI Check  # 這是這套流程的名字

# 1. 設定觸發時機：只要有人推代碼 (push) 上來就啟動
on: [push]

jobs:
  build-and-verify:
    # 2. 告訴 GitHub：給我一台虛擬電腦 (Ubuntu Linux)
    runs-on: ubuntu-latest

    steps:
    # 3. 動作一：把你的程式碼複製到這台虛擬電腦上
    - name: Checkout Code
      uses: actions/checkout@v4

    # 4. 動作二：在那台電腦裝好 Python 3.10
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 5. 動作三：安裝你要求的套件 (requirements.txt)
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 6. 動作四：執行你寫的 CI 門衛腳本
    - name: Run CI Check Script
      run: python ci_check.py